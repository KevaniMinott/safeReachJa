<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Incident Reports Manager — Jamaica Emergency Portal</title>

  <!-- ============================================================
       FONTS
       Syne         — bold sidebar/display headings (sharp, authoritative)
       DM Sans      — body copy (clean and readable at small sizes)
  ============================================================= -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES
    ============================================================= */
    :root {
      /* Surfaces */
      --bg:          #0e1117;
      --sidebar-bg:  #111318;
      --panel-bg:    #161920;
      --card-bg:     #1c1f28;
      --card-hover:  #21242e;
      --border:      rgba(255,255,255,0.07);
      --border-mid:  rgba(255,255,255,0.12);

      /* Text */
      --text:        #e8eaf0;
      --muted:       #6b7280;
      --dimmer:      #3d4252;

      /* Incident type colours */
      --fire:        #ff4d1a;
      --flood:       #2196f3;
      --emergency:   #f59e0b;
      --hurricane:   #a855f7;
      --earthquake:  #f97316;

      /* Status colours */
      --pending-c:   #f59e0b;
      --handled-c:   #22c55e;
      --complaint-c: #ef4444;
      --all-c:       #60a5fa;

      /* Risk colours */
      --risk-high:   #ef4444;
      --risk-med:    #f59e0b;
      --risk-low:    #22c55e;

      /* Jamaica accents */
      --ja-gold:     #fed100;
      --ja-green:    #009b3a;

      /* Layout */
      --sidebar-w:   230px;
      --radius:      8px;
      --font-h:      'Syne', sans-serif;
      --font-b:      'DM Sans', sans-serif;
    }

    /* ============================================================
       RESET & BASE
    ============================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--dimmer); border-radius: 3px; }

    /* ============================================================
       TOP BAR
    ============================================================= */
    .topbar {
      height: 56px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }

    /* Jamaica flag pip */
    .flag-pip {
      width: 4px;
      height: 28px;
      border-radius: 2px;
      background: linear-gradient(
        to bottom,
        var(--ja-green) 0% 33%,
        var(--ja-gold)  33% 66%,
        #000            66% 100%
      );
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: var(--font-h);
      font-size: 0.92rem;
      letter-spacing: 1.5px;
      color: var(--text);
    }

    .topbar-sub {
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 2px;
    }

    /* Live clock on the right */
    .topbar-clock {
      margin-left: auto;
      font-family: var(--font-h);
      font-size: 0.82rem;
      letter-spacing: 2px;
      color: var(--muted);
    }

    /* ============================================================
       LAYOUT — sidebar + main content
    ============================================================= */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ============================================================
       SIDEBAR — vertical nav with 4 filter buttons
    ============================================================= */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 24px 0;
      /* Subtle diagonal texture */
      background-image: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 24px,
        rgba(255,255,255,0.012) 24px,
        rgba(255,255,255,0.012) 25px
      );
    }

    /* Section label above nav buttons */
    .sidebar-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dimmer);
      padding: 0 20px 12px;
    }

    /* ── NAV BUTTONS ── */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: none;
      border: none;
      border-left: 3px solid transparent; /* Active indicator */
      cursor: pointer;
      font-family: var(--font-b);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-align: left;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      position: relative;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    /* Active state — left border + highlight */
    .nav-item.active {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-left-color: var(--nav-color);
    }

    /* Colour-coded per button */
    .nav-item[data-view="all"]       { --nav-color: var(--all-c); }
    .nav-item[data-view="pending"]   { --nav-color: var(--pending-c); }
    .nav-item[data-view="complaint"] { --nav-color: var(--complaint-c); }
    .nav-item[data-view="handled"]   { --nav-color: var(--handled-c); }

    /* Icon inside button */
    .nav-icon {
      font-size: 1.1rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    /* Count badge next to label */
    .nav-count {
      margin-left: auto;
      min-width: 22px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }

    .nav-item.active .nav-count {
      background: var(--nav-color);
      color: #000;
    }

    /* Divider inside sidebar */
    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 20px;
    }

    /* Bottom portion of sidebar — summary stats */
    .sidebar-stats {
      margin-top: auto;
      padding: 0 20px 8px;
    }

    .sidebar-stats-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dimmer);
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-row .s-label { color: var(--muted); }
    .stat-row .s-val   { font-weight: 600; color: var(--text); }

    /* ============================================================
       MAIN CONTENT — right panel
    ============================================================= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel-bg);
    }

    /* ── Content header (view title + search bar) ── */
    .content-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }

    .view-title {
      font-family: var(--font-h);
      font-size: 1.35rem;
      letter-spacing: 2px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Coloured dot next to view title */
    .view-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--active-dot, var(--all-c));
      box-shadow: 0 0 8px var(--active-dot, var(--all-c));
    }

    /* Search input */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      min-width: 220px;
    }

    .search-bar input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-b);
      font-size: 0.82rem;
      color: var(--text);
      width: 100%;
    }

    .search-bar input::placeholder { color: var(--dimmer); }
    .search-icon { color: var(--dimmer); font-size: 0.9rem; }

    /* ── Cards grid area ── */
    .cards-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    /* Grid: 3 columns on wide, 2 on medium, 1 on narrow */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ============================================================
       INCIDENT CARD
    ============================================================= */
    .incident-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      animation: cardIn 0.3s ease both;
      position: relative;
    }

    /* Staggered entry animation */
    .incident-card:nth-child(1) { animation-delay: 0.03s; }
    .incident-card:nth-child(2) { animation-delay: 0.07s; }
    .incident-card:nth-child(3) { animation-delay: 0.11s; }
    .incident-card:nth-child(4) { animation-delay: 0.15s; }
    .incident-card:nth-child(5) { animation-delay: 0.19s; }
    .incident-card:nth-child(6) { animation-delay: 0.23s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .incident-card:hover {
      border-color: var(--border-mid);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      background: var(--card-hover);
    }

    /* Top colour stripe — coloured per incident type */
    .card-stripe {
      height: 3px;
      background: var(--stripe-color, var(--muted));
    }

    /* ── Card image ── */
    .card-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: var(--panel-bg); /* fallback while image loads */
    }

    /* Image placeholder (shown if no image) */
    .card-image-placeholder {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, var(--panel-bg) 0%, var(--card-bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      opacity: 0.5;
    }

    /* ── Card body ── */
    .card-body { padding: 16px 18px 18px; }

    /* Row 1: incident type + status badge */
    .card-row-1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    /* Incident type tag */
    .type-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--tag-color, var(--muted));
    }

    .type-tag-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--tag-color, var(--muted));
    }

    /* Status pill */
    .status-pill {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-pending   { background: rgba(245,158,11,0.14); color: var(--pending-c); }
    .status-complaint { background: rgba(239,68,68,0.14);  color: var(--complaint-c); }
    .status-handled   { background: rgba(34,197,94,0.14);  color: var(--handled-c); }

    /* Incident description / title */
    .card-title {
      font-family: var(--font-h);
      font-size: 1rem;
      letter-spacing: 0.5px;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* ── Info pills row ── */
    .info-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 14px;
    }

    .info-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
    }

    .info-pill .pi { font-size: 0.82rem; }

    /* ── Risk badge ── */
    .risk-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .risk-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dimmer);
    }

    .risk-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .risk-high   { background: rgba(239,68,68,0.14);  color: var(--risk-high); }
    .risk-medium { background: rgba(245,158,11,0.14); color: var(--risk-med); }
    .risk-low    { background: rgba(34,197,94,0.14);  color: var(--risk-low); }

    /* Risk bar */
    .risk-bar {
      height: 3px;
      border-radius: 2px;
      margin-top: 6px;
      background: var(--border);
      overflow: hidden;
    }

    .risk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* ============================================================
       EMPTY STATE
    ============================================================= */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 72px 32px;
      color: var(--dimmer);
    }

    .empty-state .es-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p        { font-size: 0.85rem; }

    /* ============================================================
       DETAIL MODAL — clicking a card opens full detail overlay
    ============================================================= */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-backdrop.open {
      display: flex;
      animation: fadeIn 0.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease both;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-header h2 {
      font-family: var(--font-h);
      font-size: 1.15rem;
      letter-spacing: 1px;
      line-height: 1.3;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .modal-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--panel-bg);
    }

    .modal-img-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, var(--panel-bg) 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      opacity: 0.3;
    }

    .modal-body { padding: 20px 24px; }

    .modal-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .modal-detail-row:last-child { border-bottom: none; }
    .modal-detail-row .dk { color: var(--muted); font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    .modal-detail-row .dv { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; }

    /* Status update buttons in modal */
    .modal-actions {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      flex: 1;
      min-width: 110px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      font-family: var(--font-b);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s;
      color: var(--muted);
    }

    .action-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .action-btn.primary { background: var(--ja-green); border-color: var(--ja-green); color: #fff; }
    .action-btn.primary:hover { opacity: 0.85; }
    .action-btn.danger { border-color: rgba(239,68,68,0.4); color: var(--complaint-c); }
    .action-btn.danger:hover { background: rgba(239,68,68,0.1); }

    /* ============================================================
       RESPONSIVE
    ============================================================= */
    @media (max-width: 768px) {
      :root { --sidebar-w: 60px; }

      .nav-item span:not(.nav-icon):not(.nav-count) { display: none; }
      .nav-count { display: none; }
      .sidebar-label, .sidebar-stats { display: none; }
      .nav-item { justify-content: center; padding: 14px; border-left: none; border-bottom: 3px solid transparent; }
      .nav-item.active { border-bottom-color: var(--nav-color); border-left-color: transparent; }
      .sidebar { padding: 16px 0; }
      .cards-area { padding: 16px; }
      .content-header { padding: 14px 16px; }
      .search-bar { min-width: 150px; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       TOP BAR
  ============================================================= -->
  <header class="topbar">
    <div class="flag-pip" aria-hidden="true"></div>
    <div>
      <div class="topbar-title">Incident Reports Manager</div>
      <div class="topbar-sub">Jamaica Emergency Portal</div>
    </div>
    <!-- Live clock — updated by JS every second -->
    <div class="topbar-clock" id="clock" aria-live="polite"></div>
  </header>


  <!-- ============================================================
       MAIN LAYOUT — sidebar + content panel
  ============================================================= -->
  <div class="layout">

    <!-- ========================================================
         SIDEBAR — 4 vertical navigation buttons
    ========================================================= -->
    <aside class="sidebar" role="navigation" aria-label="Report filters">

      <div class="sidebar-label">Filter Reports</div>

      <!--
        Each button:
          data-view  = which set of reports to show
          data-color = accent colour class applied to active state
        onclick calls setView() in JS
      -->

      <!-- All Reports -->
      <button
        class="nav-item active"
        data-view="all"
        onclick="setView('all')"
        aria-current="true"
        aria-label="All reports"
      >
        <span class="nav-icon">📋</span>
        <span>All Reports</span>
        <span class="nav-count" id="count-all">0</span>
      </button>

      <!-- Pending -->
      <button
        class="nav-item"
        data-view="pending"
        onclick="setView('pending')"
        aria-label="Pending reports"
      >
        <span class="nav-icon">⏳</span>
        <span>Pending</span>
        <span class="nav-count" id="count-pending">0</span>
      </button>

      <!-- Complaint -->
      <button
        class="nav-item"
        data-view="complaint"
        onclick="setView('complaint')"
        aria-label="Complaint reports"
      >
        <span class="nav-icon">⚠️</span>
        <span>Complaint</span>
        <span class="nav-count" id="count-complaint">0</span>
      </button>

      <!-- Being Handled -->
      <button
        class="nav-item"
        data-view="handled"
        onclick="setView('handled')"
        aria-label="Being handled reports"
      >
        <span class="nav-icon">✅</span>
        <span>Being Handled</span>
        <span class="nav-count" id="count-handled">0</span>
      </button>

      <div class="sidebar-divider"></div>

      <!-- Summary stats at the bottom of sidebar -->
      <div class="sidebar-stats">
        <div class="sidebar-stats-label">Risk Summary</div>
        <div class="stat-row">
          <span class="s-label">🔴 High Risk</span>
          <span class="s-val" id="stat-high">0</span>
        </div>
        <div class="stat-row">
          <span class="s-label">🟡 Medium</span>
          <span class="s-val" id="stat-med">0</span>
        </div>
        <div class="stat-row">
          <span class="s-label">🟢 Low Risk</span>
          <span class="s-val" id="stat-low">0</span>
        </div>
      </div>

    </aside>


    <!-- ========================================================
         MAIN CONTENT — incident cards panel
    ========================================================= -->
    <main class="main" role="main">

      <!-- Content header: title + search -->
      <div class="content-header">
        <div class="view-title">
          <div class="view-dot" id="view-dot"></div>
          <span id="view-title-text">All Reports</span>
        </div>

        <!-- Live search input — filters cards as you type -->
        <div class="search-bar" role="search">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="search-input"
            placeholder="Search by type, location, title…"
            oninput="renderCards()"
            aria-label="Search reports"
          />
        </div>
      </div>

      <!-- Cards grid — populated dynamically by JS -->
      <div class="cards-area">
        <div class="cards-grid" id="cards-grid" aria-live="polite" aria-label="Incident reports">
          <!-- JS renders cards here -->
        </div>
      </div>

    </main>

  </div><!-- /layout -->


  <!-- ============================================================
       DETAIL MODAL — shown when a card is clicked
  ============================================================= -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Incident detail"
       onclick="closeModal(event)">
    <div class="modal" id="modal">

      <div class="modal-header">
        <h2 id="modal-title">Incident Detail</h2>
        <button class="modal-close" onclick="closeModal()" aria-label="Close modal">✕</button>
      </div>

      <!-- Image or placeholder -->
      <div id="modal-image-wrap"></div>

      <div class="modal-body" id="modal-body">
        <!-- Rows injected by JS -->
      </div>

      <!-- Status action buttons -->
      <div class="modal-actions">
        <button class="action-btn primary" id="modal-btn-handle" onclick="modalAction('handled')">Mark as Handled</button>
        <button class="action-btn"         id="modal-btn-pending" onclick="modalAction('pending')">Set Pending</button>
        <button class="action-btn danger"  id="modal-btn-complaint" onclick="modalAction('complaint')">Flag Complaint</button>
      </div>

    </div>
  </div>


  <!-- ============================================================
       JAVASCRIPT

         1. Data — incident records (seeded sample data)
         2. State — current view + search string
         3. setView() — switch sidebar filter
         4. renderCards() — build card HTML from filtered data
         5. buildCard() — creates one incident card element
         6. openModal() — shows full detail for a card
         7. closeModal() — hides modal
         8. modalAction() — updates a report's status
         9. updateCounts() — refreshes sidebar badge counts
        10. Clock — live time display
  ============================================================= -->
  <script>

    /* ============================================================

        image:       null,
        typeIcon:    "🌊",
        reporter:    "Patricia Hall",
        phone:       "(876) 557-6614"
      }
    ];

    /* ============================================================
       2. APPLICATION STATE
    ============================================================= */

    /* Currently active view filter */
    let currentView = 'all';

    /* Currently open modal incident ID */
    let openIncidentId = null;

    /* Colour map for incident types */
    const TYPE_COLORS = {
      fire:       'var(--fire)',
      flood:      'var(--flood)',
      emergency:  'var(--emergency)',
      hurricane:  'var(--hurricane)',
      earthquake: 'var(--earthquake)'
    };

    /* Human-readable labels */
    const TYPE_LABELS = {
      fire: 'Fire', flood: 'Flood', emergency: 'Emergency',
      hurricane: 'Hurricane', earthquake: 'Earthquake'
    };

    /* Dot colours for the view title indicator */
    const VIEW_COLORS = {
      all:       'var(--all-c)',
      pending:   'var(--pending-c)',
      complaint: 'var(--complaint-c)',
      handled:   'var(--handled-c)'
    };

    const VIEW_LABELS = {
      all: 'All Reports', pending: 'Pending', complaint: 'Complaint', handled: 'Being Handled'
    };

    /* ============================================================
       3. setView(view)
          Switches the active sidebar button and re-renders cards.
          @param {string} view — 'all' | 'pending' | 'complaint' | 'handled'
    ============================================================= */
    function setView(view) {
      currentView = view;

      /* Update sidebar button active states */
      document.querySelectorAll('.nav-item').forEach(btn => {
        const isActive = btn.dataset.view === view;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-current', isActive ? 'true' : 'false');
      });

      /* Update view title + dot colour */
      document.getElementById('view-title-text').textContent = VIEW_LABELS[view];
      document.getElementById('view-dot').style.setProperty('background', VIEW_COLORS[view]);
      document.getElementById('view-dot').style.setProperty('box-shadow', `0 0 8px ${VIEW_COLORS[view]}`);

      /* Re-render the cards for the new filter */
      renderCards();
    }

    /* ============================================================
       4. renderCards()
          Filters INCIDENTS by currentView + search query,
          then populates the cards-grid.
    ============================================================= */
    function renderCards() {
      const grid  = document.getElementById('cards-grid');
      const query = document.getElementById('search-input').value.trim().toLowerCase();

      /* Filter step 1: by view/status */
      let filtered = currentView === 'all'
        ? [...INCIDENTS]
        : INCIDENTS.filter(r => r.status === currentView);

      /* Filter step 2: by search query (title, type, parish, location, community) */
      if (query) {
        filtered = filtered.filter(r =>
          r.title.toLowerCase().includes(query)      ||
          r.type.toLowerCase().includes(query)       ||
          r.parish.toLowerCase().includes(query)     ||
          r.location.toLowerCase().includes(query)   ||
          (r.community && r.community.toLowerCase().includes(query)) ||
          r.description.toLowerCase().includes(query)
        );
      }

      /* Render empty state if nothing found */
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="es-icon">🔍</div>
            <p>No reports found for this filter.<br>Try changing the view or search query.</p>
          </div>`;
        return;
      }

      /* Build and append card elements */
      grid.innerHTML = '';
      filtered.forEach(incident => {
        grid.appendChild(buildCard(incident));
      });
    }

    /* ============================================================
       5. buildCard(incident)
          Creates and returns a DOM element for one incident card.
          @param {object} incident
          @returns {HTMLElement}
    ============================================================= */
    function buildCard(incident) {
      const card = document.createElement('div');
      card.className = 'incident-card';
      card.setAttribute('role', 'article');
      card.setAttribute('aria-label', `Incident: ${incident.title}`);
      card.setAttribute('tabindex', '0');

      /* Click or Enter opens the detail modal */
      card.onclick = () => openModal(incident.id);
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') openModal(incident.id);
      });

      /* Risk percentage for the progress bar */
      const riskPct = incident.risk === 'high' ? 90 : incident.risk === 'medium' ? 55 : 20;
      const riskColor = incident.risk === 'high'
        ? 'var(--risk-high)'
        : incident.risk === 'medium'
          ? 'var(--risk-med)'
          : 'var(--risk-low)';

      /* Format time for display */
      const displayTime = formatTime(incident.time);

      card.innerHTML = `
        <!-- Top colour stripe coloured by incident type -->
        <div class="card-stripe" style="background: ${TYPE_COLORS[incident.type] || 'var(--muted)'}"></div>

        <!-- Incident image or emoji placeholder -->
        ${incident.image
          ? `<img class="card-image" src="${incident.image}" alt="${escapeHtml(incident.title)} incident photo" loading="lazy"/>`
          : `<div class="card-image-placeholder" aria-hidden="true">${incident.typeIcon}</div>`
        }

        <div class="card-body">

          <!-- Row 1: type tag + status badge -->
          <div class="card-row-1">
            <div class="type-tag" style="--tag-color: ${TYPE_COLORS[incident.type]}">
              <div class="type-tag-dot"></div>
              ${TYPE_LABELS[incident.type] || incident.type}
            </div>
            <span class="status-pill status-${incident.status}">
              ${statusLabel(incident.status)}
            </span>
          </div>

          <!-- Incident title -->
          <div class="card-title">${escapeHtml(incident.title)}</div>

          <!-- Info pills: time, location, parish -->
          <div class="info-pills">
            <div class="info-pill">
              <span class="pi">🕐</span>
              ${escapeHtml(displayTime)}
            </div>
            <div class="info-pill">
              <span class="pi">📍</span>
              ${escapeHtml(incident.parish)}
            </div>
            <div class="info-pill">
              <span class="pi">🏘️</span>
              ${escapeHtml(incident.community || incident.location)}
            </div>
          </div>

          <!-- Risk badge + bar -->
          <div class="risk-row">
            <span class="risk-label">Risk Level</span>
            <span class="risk-badge risk-${incident.risk}">
              ${riskIcon(incident.risk)} ${capitalize(incident.risk)}
            </span>
          </div>
          <div class="risk-bar">
            <div class="risk-bar-fill"
                 style="width: ${riskPct}%; background: ${riskColor};"></div>
          </div>

        </div>
      `;

      return card;
    }

    /* ============================================================
       6. openModal(id)
          Looks up the incident by ID and renders the detail modal.
          @param {number} id
    ============================================================= */
    function openModal(id) {
      const incident = INCIDENTS.find(r => r.id === id);
      if (!incident) return;

      openIncidentId = id;

      /* Set title */
      document.getElementById('modal-title').textContent = incident.title;

      /* Image / placeholder */
      const imgWrap = document.getElementById('modal-image-wrap');
      imgWrap.innerHTML = incident.image
        ? `<img class="modal-img" src="${incident.image}" alt="Incident photo"/>`
        : `<div class="modal-img-placeholder" aria-hidden="true">${incident.typeIcon}</div>`;

      /* Detail rows */
      const riskPct = incident.risk === 'high' ? 90 : incident.risk === 'medium' ? 55 : 20;
      const riskColor = incident.risk === 'high'
        ? 'var(--risk-high)' : incident.risk === 'medium'
          ? 'var(--risk-med)' : 'var(--risk-low)';

      document.getElementById('modal-body').innerHTML = `
        <div class="modal-detail-row">
          <span class="dk">Type of Incident</span>
          <span class="dv" style="color: ${TYPE_COLORS[incident.type]}; font-weight:700;">
            ${incident.typeIcon} ${TYPE_LABELS[incident.type]}
          </span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Status</span>
          <span class="dv"><span class="status-pill status-${incident.status}">${statusLabel(incident.status)}</span></span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Time Reported</span>
          <span class="dv">${escapeHtml(incident.time)}</span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Location</span>
          <span class="dv">${escapeHtml(incident.location)}</span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Parish</span>
          <span class="dv">${escapeHtml(incident.parish)}</span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Community</span>
          <span class="dv">${escapeHtml(incident.community || '—')}</span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Risk Level</span>
          <span class="dv">
            <span class="risk-badge risk-${incident.risk}">${riskIcon(incident.risk)} ${capitalize(incident.risk)}</span>
          </span>
        </div>
        <div class="modal-detail-row" style="flex-direction: column; align-items: flex-start; gap: 6px;">
          <span class="dk">Risk Bar</span>
          <div class="risk-bar" style="width:100%;">
            <div class="risk-bar-fill" style="width:${riskPct}%; background:${riskColor};"></div>
          </div>
        </div>
        <div class="modal-detail-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
          <span class="dk">Description</span>
          <span class="dv" style="text-align:left; max-width:100%; line-height:1.5; color: var(--muted);">
            ${escapeHtml(incident.description)}
          </span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Reported By</span>
          <span class="dv">${escapeHtml(incident.reporter)}</span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Contact</span>
          <span class="dv">${escapeHtml(incident.phone)}</span>
        </div>
        <div class="modal-detail-row">
          <span class="dk">Incident ID</span>
          <span class="dv" style="font-family: monospace; opacity:0.6;">#${incident.id}</span>
        </div>
      `;

      /* Show backdrop */
      document.getElementById('modal-backdrop').classList.add('open');

      /* Trap focus inside modal for accessibility */
      document.getElementById('modal').focus();
    }

    /* ============================================================
       7. closeModal(event)
          Hides the modal. If called from backdrop click, only
          closes if the click target IS the backdrop.
          @param {Event} [event]
    ============================================================= */
    function closeModal(event) {
      /* If triggered by backdrop click, check target */
      if (event && event.target !== document.getElementById('modal-backdrop')) return;
      document.getElementById('modal-backdrop').classList.remove('open');
      openIncidentId = null;
    }

    /* Close modal with Escape key */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    /* ============================================================
       8. modalAction(newStatus)
          Updates the status of the currently open incident
          then re-renders cards and counts.
          @param {string} newStatus — 'handled' | 'pending' | 'complaint'
    ============================================================= */
    function modalAction(newStatus) {
      if (openIncidentId === null) return;

      /* Find and update the incident in the data array */
      const incident = INCIDENTS.find(r => r.id === openIncidentId);
      if (incident) {
        incident.status = newStatus;
      }

      /* Refresh UI */
      renderCards();
      updateCounts();
      closeModal();
    }

    /* ============================================================
       9. updateCounts()
          Refreshes the badge counts on each sidebar nav button
          and the risk summary stats.
    ============================================================= */
    function updateCounts() {
      document.getElementById('count-all').textContent       = INCIDENTS.length;
      document.getElementById('count-pending').textContent   = INCIDENTS.filter(r => r.status === 'pending').length;
      document.getElementById('count-complaint').textContent = INCIDENTS.filter(r => r.status === 'complaint').length;
      document.getElementById('count-handled').textContent   = INCIDENTS.filter(r => r.status === 'handled').length;

      document.getElementById('stat-high').textContent = INCIDENTS.filter(r => r.risk === 'high').length;
      document.getElementById('stat-med').textContent  = INCIDENTS.filter(r => r.risk === 'medium').length;
      document.getElementById('stat-low').textContent  = INCIDENTS.filter(r => r.risk === 'low').length;
    }

    /* ============================================================
       HELPER FUNCTIONS
    ============================================================= */

    /** Returns a human-readable status label */
    function statusLabel(s) {
      return { pending: 'Pending', complaint: 'Complaint', handled: 'Being Handled' }[s] || s;
    }

    /** Returns a risk-level icon */
    function riskIcon(r) {
      return { high: '🔴', medium: '🟡', low: '🟢' }[r] || '⚪';
    }

    /** Capitalises first letter */
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    /** Sanitises string for safe HTML insertion (XSS prevention) */
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /** Formats a datetime string as a short readable form */
    function formatTime(dt) {
      if (!dt) return '—';
      try {
        const d = new Date(dt.replace(' ', 'T'));
        return d.toLocaleString('en-JM', {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      } catch { return dt; }
    }

    /* ============================================================
       10. LIVE CLOCK — updates topbar every second
    ============================================================= */
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-JM', {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZone: 'America/Jamaica'
      });
    }

    /* ============================================================
       INITIALISATION — runs on page load
    ============================================================= */
    (function init() {
      updateCounts();   /* Set badge counts from seed data */
      renderCards();    /* Render 'all' view by default */
      updateClock();    /* Initial clock render */
      setInterval(updateClock, 1000); /* Update clock every second */

      /* Set initial view dot colour */
      document.getElementById('view-dot').style.background = VIEW_COLORS['all'];
      document.getElementById('view-dot').style.boxShadow  = `0 0 8px ${VIEW_COLORS['all']}`;
    })();

  </script>
